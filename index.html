<style>
/* ─── Reset ───────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;direction:rtl;background:var(--bg);color:var(--text);transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}

/* ─── Light mode — clean & high-contrast ─── */
:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --card2:#f8fafc;
  --text:#1a202c;
  --text2:#4a5568;
  --sub:#718096;
  --border:#e2e8f0;
  --border2:#cbd5e0;
  --inp:#1a202c;
  --row1:#ffffff;
  --row2:#f7fafc;
  --hi:#fefcbf;
  --sel:#c6f6d5;
  --sidebar:#ffffff;
  --ibg:#ffffff;
  --shadow:rgba(0,0,0,.06);
  --shadow2:rgba(0,0,0,.12);
  --accent:#2b6cb0;
  --accent-light:#ebf4ff;
  --green:#276749;
  --red:#c53030;
  --orange:#c05621;
}

/* ─── Dark mode — deep professional ─────── */
.dark{
  --bg:#0d1117;
  --card:#161b22;
  --card2:#1c2128;
  --text:#e6edf3;
  --text2:#b1bac4;
  --sub:#8b949e;
  --border:#30363d;
  --border2:#484f58;
  --inp:#e6edf3;
  --row1:#161b22;
  --row2:#1c2128;
  --hi:#3d3510;
  --sel:#0d3321;
  --sidebar:#161b22;
  --ibg:#21262d;
  --shadow:rgba(0,0,0,.4);
  --shadow2:rgba(0,0,0,.6);
  --accent:#58a6ff;
  --accent-light:#1c2d4f;
  --green:#3fb950;
  --red:#f85149;
  --orange:#ffa657;
}

/* ─── Scrollbar ───────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--sub)}

/* ─── Animations ──────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes tipFadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ─── Form elements ───────────────────────── */
input,textarea,select{font-family:inherit;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-light)!important}

/* ─── Card elevation system ───────────────── */
.card-sm{background:var(--card);border-radius:10px;box-shadow:0 1px 3px var(--shadow)}
.card-md{background:var(--card);border-radius:12px;box-shadow:0 2px 8px var(--shadow)}
.card-lg{background:var(--card);border-radius:16px;box-shadow:0 4px 16px var(--shadow2)}

/* ─── Table improvements ──────────────────── */
table{border-collapse:separate;border-spacing:0}

/* ─── Button base ─────────────────────────── */
button{transition:opacity .15s,transform .1s}
button:active{transform:scale(.97)}

/* ─── Mobile ──────────────────────────────── */
@media(max-width:600px){
  .hide-mobile{display:none!important}
}
</style>
